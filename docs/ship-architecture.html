<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship — Arquitetura</title>
<style>
  :root{
    --bg:#05070c; --panel:rgba(18,21,30,.72); --panel-solid:#12151c; --border:#232837;
    --text:#e6e9f0; --muted:#8b93a7; --accent:#6ea8fe; --accent2:#7ee2b8;
    --warn:#f5c26b; --crit:#f57171; --purple:#b892ff; --pink:#ff8fc7; --gray:#8b93a7;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(110,168,254,.07), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(184,146,255,.06), transparent 45%),
      var(--bg);
    color:var(--text); min-height:100vh; overflow-x:hidden;
  }
  header{
    padding:16px 24px 12px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:rgba(5,7,12,0.85); backdrop-filter:blur(10px); z-index:200;
  }
  header h1{margin:0 0 3px; font-size:19px; letter-spacing:.3px;
    background:linear-gradient(90deg,var(--text),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  header p{margin:0; color:var(--muted); font-size:12.5px;}

  .toolbar{display:flex; gap:10px; margin-top:12px; align-items:center; flex-wrap:wrap;}
  .search-box{position:relative; flex:0 0 240px;}
  .search-box input{
    width:100%; background:var(--panel-solid); border:1px solid var(--border); color:var(--text);
    padding:8px 12px 8px 30px; border-radius:999px; font-size:12.5px; outline:none; transition:.15s;
  }
  .search-box input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(110,168,254,.15);}
  .search-box .ico{position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--muted); pointer-events:none;}
  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{
    background:var(--panel-solid); border:1px solid var(--border); color:var(--muted);
    padding:6px 12px; border-radius:999px; cursor:pointer; font-size:11.5px; font-weight:600;
    transition:.15s; user-select:none; display:flex; align-items:center; gap:5px;
  }
  .chip i.dot{width:7px; height:7px; border-radius:50%; display:inline-block;}
  .chip:hover{color:var(--text); border-color:var(--accent);}
  .chip.off{opacity:.35;}
  .chip.on{color:var(--text);}
  .hint{font-size:11px; color:var(--muted); margin-left:auto; white-space:nowrap;}
  .hint kbd{background:var(--panel-solid); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-size:10px;}

  .canvas-outer{position:relative; width:100%; overflow-x:auto; overflow-y:hidden; padding:26px 0 60px;}
  .canvas-wrap{position:relative; display:inline-flex; gap:46px; padding:0 32px; min-height:640px;}
  svg.edges{position:absolute; top:0; left:0; pointer-events:none; z-index:1; overflow:visible;}

  .lane{position:relative; z-index:2; display:flex; flex-direction:column; min-width:198px; gap:22px;}
  .lane-header{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700;
    padding-bottom:8px; border-bottom:1px dashed var(--border); margin-bottom:2px; white-space:nowrap;
  }
  .lane-header .lane-count{color:var(--text); background:var(--panel-solid); border-radius:999px; padding:1px 6px; margin-left:5px; font-size:9.5px;}

  .node{
    background:var(--panel); backdrop-filter:blur(6px); border:1px solid var(--border); border-radius:var(--radius);
    padding:11px 13px; cursor:pointer; transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .18s ease, filter .18s ease;
    position:relative; box-shadow:0 0 0 rgba(0,0,0,0);
  }
  .node::before{
    content:''; position:absolute; inset:-1px; border-radius:var(--radius); padding:1px;
    background:linear-gradient(135deg, var(--node-glow, transparent), transparent 60%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; opacity:.5; pointer-events:none;
  }
  .node:hover{transform:translateY(-3px); border-color:var(--node-glow, var(--accent)); box-shadow:0 8px 24px rgba(0,0,0,.4), 0 0 18px -6px var(--node-glow, var(--accent));}
  .node.selected{border-color:var(--accent2); box-shadow:0 0 0 1.5px var(--accent2), 0 0 26px -4px var(--accent2);}
  .node.hl{border-color:var(--node-glow, var(--accent2)); box-shadow:0 0 0 1px var(--node-glow,var(--accent2)), 0 0 22px -6px var(--node-glow,var(--accent2)); animation:pulse 1.6s ease-in-out infinite;}
  .node.dim{opacity:.16; filter:grayscale(.6); transform:none !important; box-shadow:none !important;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 1px var(--node-glow,var(--accent2)), 0 0 14px -6px var(--node-glow,var(--accent2));} 50%{box-shadow:0 0 0 1px var(--node-glow,var(--accent2)), 0 0 30px -4px var(--node-glow,var(--accent2));}}
  .node h3{margin:0 0 5px; font-size:12.5px; display:flex; align-items:center; gap:5px; line-height:1.3;}
  .node p.sub{margin:0; font-size:10.5px; color:var(--muted); line-height:1.4;}
  .node .row-badges{display:flex; flex-wrap:wrap; gap:3px; margin-bottom:5px;}

  .badge{
    display:inline-flex; align-items:center; font-size:9px; font-weight:700; text-transform:uppercase;
    padding:2px 6px; border-radius:5px; letter-spacing:.3px; white-space:nowrap;
  }
  .b-model{background:rgba(110,168,254,.15); color:var(--accent);}
  .b-fork{background:rgba(126,226,184,.15); color:var(--accent2);}
  .b-nofork{background:rgba(245,194,107,.15); color:var(--warn);}
  .b-parallel{background:rgba(184,146,255,.15); color:var(--purple);}
  .b-event{background:rgba(245,113,113,.15); color:var(--crit);}
  .b-matcher{background:rgba(255,143,199,.15); color:var(--pink);}
  .b-util{background:rgba(139,147,167,.15); color:var(--muted);}

  .route{display:inline-flex; align-items:center; gap:2px; cursor:pointer; border-radius:6px; padding:1px 2px;}
  .route .arr{color:var(--purple); font-size:9px;}
  .route-hint{font-size:8.5px; color:var(--purple); margin-left:3px; opacity:.85;}

  path.edge{fill:none; stroke-width:1.4; opacity:.32; transition:opacity .18s, stroke-width .18s;}
  path.edge.e-seq{stroke:var(--accent);}
  path.edge.e-route{stroke:var(--purple); stroke-dasharray:3 4;}
  path.edge.e-delegate{stroke:var(--accent2); stroke-dasharray:2 3;}
  path.edge.e-hook{stroke:var(--crit);}
  path.edge.e-call{stroke:var(--gray); stroke-dasharray:1 4;}
  path.edge.e-orchestrate{stroke:var(--warn); stroke-dasharray:5 3; opacity:.22;}
  path.edge.active{opacity:.95; stroke-width:2.2;}
  path.edge.faded{opacity:.04;}
  .particle{opacity:.9;}
  .particle.faded{opacity:.05;}

  .popover{
    position:fixed; width:360px; max-width:88vw; max-height:64vh; overflow-y:auto;
    background:rgba(17,20,29,.96); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:12px;
    z-index:300; padding:18px 20px; box-shadow:0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02);
    opacity:0; transform:scale(.96); transform-origin:var(--pop-origin-x,0%) var(--pop-origin-y,50%);
    transition:opacity .16s ease, transform .16s ease; pointer-events:none;
  }
  .popover.open{opacity:1; transform:scale(1); pointer-events:auto;}
  .popover::before{
    content:''; position:absolute; width:11px; height:11px; background:inherit; border:1px solid var(--border);
    transform:rotate(45deg); z-index:-1;
  }
  .popover.arrow-left::before{left:-6px; top:var(--pop-arrow-y,20px); border-right:none; border-bottom:none;}
  .popover.arrow-right::before{right:-6px; top:var(--pop-arrow-y,20px); border-left:none; border-top:none;}
  .popover h2{margin:0 0 4px; font-size:15px; padding-right:20px;}
  .popover .path{font-family:ui-monospace,Menlo,monospace; font-size:10.5px; color:var(--accent); word-break:break-all; margin-bottom:13px;}
  .popover .field{margin-bottom:12px;}
  .popover .field label{display:block; font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:3px; font-weight:700;}
  .popover .field div{font-size:12.5px; line-height:1.5;}
  .popover ul{margin:4px 0 0; padding-left:17px; font-size:12.5px; line-height:1.55;}
  .close-btn{
    position:absolute; top:12px; right:12px; background:none; border:none; color:var(--muted);
    font-size:16px; cursor:pointer; line-height:1;
  }

  code{background:rgba(255,255,255,.06); padding:1px 5px; border-radius:4px; font-size:11.5px;}
  .config-block{
    background:#0d1017; border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; line-height:1.65;
    white-space:pre-wrap; overflow-x:auto; color:#c7cede;
  }
  .two-col-mini{display:flex; flex-direction:column; gap:10px;}
  .info-box-mini{background:var(--panel-solid); border:1px solid var(--border); border-radius:8px; padding:12px;}
  .info-box-mini h4{margin:0 0 5px; font-size:12.5px;}
  .info-box-mini p{margin:0; font-size:11.5px; color:var(--muted); line-height:1.5;}

  ::-webkit-scrollbar{height:10px; width:10px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>

<header>
  <h1>🚢 Ship — Arquitetura do Pipeline</h1>
  <p>Grafo vivo do pipeline. Clique em um nó para acender suas conexões; use a busca para escanear o grafo; ligue/desligue camadas abaixo.</p>
  <div class="toolbar">
    <div class="search-box">
      <span class="ico">⌕</span>
      <input id="search" type="text" placeholder="Escanear nós (ex: sonnet, hook, audit)...">
    </div>
    <div class="chips" id="chips"></div>
    <span class="hint">clique no fundo do canvas para limpar a seleção &nbsp;·&nbsp; <kbd>Esc</kbd></span>
  </div>
</header>

<div class="canvas-outer" id="canvasOuter">
  <div class="canvas-wrap" id="canvasWrap">
    <svg class="edges" id="edgesSvg"></svg>
  </div>
</div>

<div class="popover" id="detail">
  <button class="close-btn" id="closeDetail">✕</button>
  <h2 id="d-title"></h2>
  <div class="path" id="d-path"></div>
  <div id="d-body"></div>
</div>

<script>
// ============================================================
// DATA — nodes + edges of the whole Ship pipeline as one graph
// ============================================================
const GROUPS = {
  pipeline:   {label:'Pipeline (/ship:run)', color:'var(--accent)'},
  quality:    {label:'Quality Gate (haiku→sonnet)', color:'var(--purple)'},
  audit:      {label:'Audit Suite (/ship:audit:*)', color:'var(--pink)'},
  workers:    {label:'Agentes (leaf workers)', color:'var(--accent2)'},
  hookevents: {label:'Hooks registrados (eventos)', color:'var(--crit)'},
  hookutil:   {label:'Hooks utilitários (lazy-load)', color:'var(--gray)'},
  build:      {label:'Build System', color:'var(--warn)'},
  meta:       {label:'Referência', color:'var(--muted)'},
};

const NODES = [
  // ---- pipeline lane ----
  {id:'run', group:'pipeline', title:'/ship:run', model:'sonnet', fork:false, path:'src/skills/run/SKILL.md',
    sub:'Orquestrador top-level — não roda em fork (precisa persistir p/ homolog interativo)',
    desc:'Ponto de entrada do pipeline. Lê o config, decide quais fases rodam, e é o único que escreve .context/ship-run/<task-id>/phase-status.md consolidado. Chama diretamente os scripts utilitários (capture-diff, diff-classify, plan-validate, snapshot-files, evidence-gate, rerun-scope, status-consolidate) via Bash.'},
  {id:'init', group:'pipeline', title:'/ship:init', model:'haiku', fork:false, path:'src/skills/init/SKILL.md',
    sub:'Detecta stack/convenções, escreve ship/config.md',
    desc:'Pré-requisito para todo o resto. Roda uma única vez por projeto, fora do /ship:run.'},
  {id:'spec', group:'pipeline', title:'/ship:spec', model:'sonnet', fork:false, path:'src/skills/spec/SKILL.md',
    sub:'Input bruto → spec + tasks granulares (<400 linhas)',
    desc:'Decompõe a especificação em tasks. Modo Linear cria projeto/documents/milestones/labels/issues; modo local escreve em ship/changes/<feature>/. Chama sc-crossref.sh para validar cobertura de cenários @SC-XX.'},
  {id:'plan', group:'pipeline', title:'/ship:plan', model:'sonnet', fork:true, path:'src/skills/plan/SKILL.md',
    sub:'Fase 1.8 — lê cenários @SC-XX, gera plan.md único',
    desc:'Fonte única de verdade consumida tanto por develop quanto por test, reduzindo drift entre implementação e testes. plan.md é validado por plan-validate.sh antes de ser consumido.'},
  {id:'develop', group:'pipeline', title:'/ship:develop', model:'sonnet', fork:true, path:'src/skills/develop/SKILL.md',
    sub:'Fase 2 — implementador direto, módulos em sequência num só contexto',
    desc:'Implementa todos os módulos do plan.md ele mesmo (Edit/Write), em ordem de dependência, sem leaf workers — convenções consistentes e zero custo de partida por agente.'},
  {id:'test', group:'pipeline', title:'/ship:test', model:'sonnet', fork:true, path:'src/skills/test/SKILL.md',
    sub:'Fase 3 — lê Test Scope do config, despacha por camada habilitada',
    desc:'Também sem Edit/Write direto. Só dispara os workers das camadas habilitadas em "Test Scope" do config.md.'},
  {id:'homolog', group:'pipeline', title:'/ship:homolog', model:'haiku', fork:false, path:'src/skills/homolog/SKILL.md',
    sub:'Fase 7 — consolida relatórios, aguarda aprovação do usuário',
    desc:'NÃO roda em fork — precisa persistir a sessão para aguardar a aprovação interativa do usuário e marcar a issue como Done.'},
  {id:'pr', group:'pipeline', title:'/ship:pr', model:'haiku', fork:false, path:'src/skills/pr/SKILL.md',
    sub:'Cria branch, commits atômicos, PR com relatório agregado',
    desc:'Também sem fork. Pode rodar após homolog ou de forma standalone (homologate-and-PR em um passo).'},

  // ---- quality lane (haiku wrappers) ----
  {id:'perf', group:'quality', title:'/ship:perf', model:'haiku→sonnet', path:'src/skills/perf/SKILL.md', agent:'ship-perf', glow:'var(--purple)',
    desc:'Wrapper fino que delega via Agent tool para ship-perf (sonnet). Analisa performance do diff, adapta por tipo de projeto.'},
  {id:'security', group:'quality', title:'/ship:security', model:'haiku→sonnet', path:'src/skills/security/SKILL.md', agent:'ship-security', glow:'var(--purple)',
    desc:'Wrapper delegando para ship-security (sonnet). Scan OWASP do diff com 3 sub-agentes internos por categoria de ataque.'},
  {id:'review', group:'quality', title:'/ship:review', model:'haiku→sonnet', path:'src/skills/review/SKILL.md', agent:'ship-review', glow:'var(--purple)',
    desc:'Wrapper delegando para ship-review (sonnet). Revisão SOLID/DRY/KISS/Clean Code + consistência do projeto.'},
  {id:'analyze', group:'quality', title:'/ship:analyze', model:'haiku→sonnet', path:'src/skills/analyze/SKILL.md', agent:'ship-analyze', glow:'var(--purple)',
    desc:'Wrapper delegando para ship-analyze (sonnet). Fase 6.5 — mapeia drift spec↔código↔testes via matriz de correlação Jaccard, gate PASS/WARN/FAIL.'},

  // ---- audit lane ----
  {id:'audit-run', group:'audit', title:'/ship:audit:run', model:'haiku', fork:false, path:'src/skills/audit:run/SKILL.md',
    sub:'Meta-orquestrador — roteia por ship/config.md',
    desc:'Lança as auditorias aplicáveis via Skill tool (cada uma forkada) em um único turno, depois consolida os JSON summaries em um relatório único com gate pessimista (qualquer FAIL→FAIL, qualquer WARN→WARN, senão PASS). NUNCA é chamado a partir de /ship:run — é standalone.'},
  {id:'audit-backend', group:'audit', title:'audit:backend', model:'haiku→sonnet', path:'src/skills/audit:backend/SKILL.md', agent:'ship-audit-backend', glow:'var(--pink)',
    desc:'3 sub-agentes paralelos: DB+Cache+Locks / I/O+Memory / Network+Security-Adjacent.'},
  {id:'audit-database', group:'audit', title:'audit:database', model:'haiku→sonnet', path:'src/skills/audit:database/SKILL.md', agent:'ship-audit-database', glow:'var(--pink)',
    desc:'Roteia metodologia por engine: MongoDB / PostgreSQL / MySQL, conforme ship/config.md.'},
  {id:'audit-frontend', group:'audit', title:'audit:frontend', model:'haiku→sonnet', path:'src/skills/audit:frontend/SKILL.md', agent:'ship-audit-frontend', glow:'var(--pink)',
    desc:'Auto-roteia para metodologia Next.js (5 camadas) ou genérica (11 categorias) conforme ship/config.md.'},
  {id:'audit-security', group:'audit', title:'audit:security', model:'haiku→sonnet', path:'src/skills/audit:security/SKILL.md', agent:'ship-audit-security', glow:'var(--pink)',
    desc:'Até 4 sub-agentes paralelos. OWASP Top 10 + mapeamento CWE, nota A-F, PoC para critical/high.'},
  {id:'audit-tests', group:'audit', title:'audit:tests', model:'haiku→sonnet', path:'src/skills/audit:tests/SKILL.md', agent:'ship-audit-tests', glow:'var(--pink)',
    desc:'Correlação Jaccard entre AC/REQ da spec e testes existentes, cobrindo TODAS as camadas (diferente de /ship:analyze, que só cobre as camadas habilitadas no Test Scope).'},

  // ---- workers (leaf agents) ----
  {id:'ship-test-unit', group:'workers', title:'ship-test-unit', model:'sonnet', path:'src/agents/ship-test-unit.md',
    desc:'Gera+roda testes unitários (leaf worker). Tools: Read,Glob,Grep,Bash,Edit,Write.'},
  {id:'ship-test-integration', group:'workers', title:'ship-test-integration', model:'sonnet', path:'src/agents/ship-test-integration.md',
    desc:'Gera+roda testes de integração (leaf worker). Tools: Read,Glob,Grep,Bash,Edit,Write.'},
  {id:'ship-test-e2e', group:'workers', title:'ship-test-e2e', model:'sonnet', path:'src/agents/ship-test-e2e.md',
    desc:'Gera+roda testes e2e (leaf worker). Tools: Read,Glob,Grep,Bash,Edit,Write.'},
  {id:'ship-perf', group:'workers', title:'ship-perf', model:'sonnet', path:'src/agents/ship-perf.md',
    desc:'Análise de performance do diff, adapta por tipo de projeto. Tools: Read,Glob,Grep,Bash,Agent.'},
  {id:'ship-security', group:'workers', title:'ship-security', model:'sonnet', path:'src/agents/ship-security.md',
    desc:'Scan OWASP do diff, 3 sub-agentes internos. Tools: Read,Glob,Grep,Bash,Agent.'},
  {id:'ship-review', group:'workers', title:'ship-review', model:'sonnet', path:'src/agents/ship-review.md',
    desc:'Revisão SOLID/DRY/KISS/Clean Code e consistência do projeto. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-analyze', group:'workers', title:'ship-analyze', model:'sonnet', path:'src/agents/ship-analyze.md',
    desc:'Drift spec↔código↔teste, matriz de correlação Jaccard. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-audit-backend', group:'workers', title:'ship-audit-backend', model:'sonnet', path:'src/agents/ship-audit-backend.md',
    desc:'Auditoria project-wide de backend, 3 sub-agentes. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-audit-database', group:'workers', title:'ship-audit-database', model:'sonnet', path:'src/agents/ship-audit-database.md',
    desc:'Auditoria de banco, roteada por engine. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-audit-frontend', group:'workers', title:'ship-audit-frontend', model:'sonnet', path:'src/agents/ship-audit-frontend.md',
    desc:'Auditoria de frontend, Next.js ou genérica. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-audit-security', group:'workers', title:'ship-audit-security', model:'sonnet', path:'src/agents/ship-audit-security.md',
    desc:'AppSec project-wide, OWASP/CWE, nota A-F. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},
  {id:'ship-audit-tests', group:'workers', title:'ship-audit-tests', model:'sonnet', path:'src/agents/ship-audit-tests.md',
    desc:'Cobertura de testes project-wide via Jaccard. Tools: Read,Glob,Grep,Bash,Agent,mcp linear.'},

  // ---- hook events (registered, auto-fire) ----
  {id:'evt-bash', group:'hookevents', title:'Tool: Bash', sub:'PreToolUse', event:'PreToolUse', matcher:'Bash', path:'—',
    desc:'Evento nativo do Claude Code disparado antes de qualquer chamada à tool Bash. Ship registra um hook aqui.'},
  {id:'evt-write', group:'hookevents', title:'Tool: Write | Edit', sub:'PostToolUse', event:'PostToolUse', matcher:'Write|Edit', path:'—',
    desc:'Evento nativo do Claude Code disparado depois de qualquer chamada às tools Write ou Edit. Ship registra um hook aqui.'},
  {id:'guard-destructive-git', group:'hookevents', title:'guard-destructive-git.sh', event:'PreToolUse', matcher:'Bash', path:'src/hooks/guard-destructive-git.sh',
    desc:'Lê o evento PreToolUse (JSON) do stdin, extrai o comando Bash prestes a rodar e bloqueia (exit 2, mensagem no stderr) se ele descartar trabalho não commitado sem chance de recuperação: git clean -f, git checkout -- . / git checkout ., git reset --hard, git branch -D, git push --force.',
    why:'Criado depois que um arquivo não commitado foi perdido permanentemente por exatamente essa sequência (git clean -fd + git checkout -- .) rodada em debug sem confirmação.'},
  {id:'hygiene-scan', group:'hookevents', title:'hygiene-scan.sh', event:'PostToolUse', matcher:'Write|Edit', path:'src/hooks/hygiene-scan.sh',
    desc:'Lê o evento PostToolUse (JSON) do stdin, extrai o arquivo escrito e escaneia (modo hook, um arquivo) atrás de spec IDs (AC-/SC-/REQ-/MOB-) e comentários em código/teste. Em violação, imprime file:line no stderr e sai com exit 2 — bloqueia o turno e devolve o motivo ao modelo, que corrige semanticamente. Também tem modo --all (sweep) que varre a árvore inteira.',
    why:'Enforça a regra do projeto: zero comentários e zero spec IDs vazando para código/testes — ver CLAUDE.md.'},

  // ---- hook utility scripts (lazy-load, called explicitly) ----
  {id:'capture-diff', group:'hookutil', title:'capture-diff.sh', path:'src/hooks/capture-diff.sh',

// ============================================================
// RENDER
// ============================================================
const LANE_ORDER = ['pipeline','quality','audit','workers','hookevents','hookutil','build','meta'];
const byId = {}; NODES.forEach(n => byId[n.id] = n);

const wrap = document.getElementById('canvasWrap');
const svg = document.getElementById('edgesSvg');

LANE_ORDER.forEach(g => {
  const lane = document.createElement('div');
  lane.className = 'lane'; lane.dataset.lane = g;
  const nodesInLane = NODES.filter(n => n.group === g);
  lane.innerHTML = `<div class="lane-header">${GROUPS[g].label}<span class="lane-count">${nodesInLane.length}</span></div>`;
  nodesInLane.forEach(n => lane.appendChild(nodeEl(n)));
  wrap.appendChild(lane);
});

function modelBadgeHTML(item){
  if(!item.model) return '';
  if(item.model.includes('→')){
    const [from,to] = item.model.split('→');
    return `<span class="route" title="Clique para ver por que ${from} delega para ${to}">
      <span class="badge b-model">${from}</span><span class="arr">→</span><span class="badge b-model">${to}</span>
      <span class="route-hint">por quê?</span>
    </span>`;
  }
  return `<span class="badge b-model">${item.model}</span>`;
}

function nodeEl(item){
  const el = document.createElement('div');
  el.className = 'node'; el.dataset.id = item.id;
  if(item.glow) el.style.setProperty('--node-glow', item.glow);
  else el.style.setProperty('--node-glow', GROUPS[item.group].color);
  const badges = [modelBadgeHTML(item)];
  if(item.fork===true) badges.push(`<span class="badge b-fork">fork</span>`);
  if(item.fork===false) badges.push(`<span class="badge b-nofork">no-fork</span>`);
  if(item.event) badges.push(`<span class="badge b-event">${item.event}</span>`);
  if(item.matcher) badges.push(`<span class="badge b-matcher">${item.matcher}</span>`);
  if(item.group==='hookutil') badges.push(`<span class="badge b-util">lazy-load</span>`);
  el.innerHTML = `<h3>${item.title}</h3>
    <div class="row-badges">${badges.join('')}</div>
    <p class="sub">${item.sub || (item.desc ? item.desc.slice(0,90)+'…' : '')}</p>`;
  return el;
}

// ============================================================
// EDGE LAYOUT
// ============================================================
function edgePath(id){ return document.getElementById('path-'+id); }

function rectRelativeTo(el, container){
  const r = el.getBoundingClientRect();
  const c = container.getBoundingClientRect();
  return {left:r.left-c.left, top:r.top-c.top, width:r.width, height:r.height};
}

function buildSvg(){
  const w = wrap.scrollWidth, h = wrap.scrollHeight;
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = '';
  EDGES.forEach(([from,to,type], i) => {
    const fromEl = wrap.querySelector(`.node[data-id="${from}"]`);
    const toEl = wrap.querySelector(`.node[data-id="${to}"]`);
    if(!fromEl || !toEl) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class', `edge e-${type}`);
    path.setAttribute('id', `path-${i}`);
    path.dataset.from = from; path.dataset.to = to; path.dataset.type = type;
    svg.appendChild(path);
    if(type === 'route'){
      const particle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      particle.setAttribute('r','3'); particle.setAttribute('fill','var(--purple)');
      particle.setAttribute('class','particle'); particle.dataset.from = from; particle.dataset.to = to;
      const anim = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      anim.setAttribute('dur', (2.4 + (i%5)*0.3).toFixed(1)+'s');
      anim.setAttribute('repeatCount','indefinite');
      const mpath = document.createElementNS('http://www.w3.org/2000/svg','mpath');
      mpath.setAttributeNS('http://www.w3.org/1999/xlink','href', `#path-${i}`);
      anim.appendChild(mpath);
      particle.appendChild(anim);
      svg.appendChild(particle);
    }
  });
  layoutEdges();
}

function layoutEdges(){
  const paths = svg.querySelectorAll('path.edge');
  paths.forEach(path => {
    const fromEl = wrap.querySelector(`.node[data-id="${path.dataset.from}"]`);
    const toEl = wrap.querySelector(`.node[data-id="${path.dataset.to}"]`);
    if(!fromEl || !toEl){ path.setAttribute('d',''); return; }
    if(fromEl.closest('.lane').style.display === 'none' || toEl.closest('.lane').style.display === 'none'){
      path.setAttribute('d',''); return;
    }
    const fr = rectRelativeTo(fromEl, wrap), tr = rectRelativeTo(toEl, wrap);
    const sameLane = fromEl.closest('.lane') === toEl.closest('.lane');
    let x1,y1,x2,y2;
    if(sameLane){
      x1 = fr.left + fr.width/2; y1 = fr.top + fr.height;
      x2 = tr.left + tr.width/2; y2 = tr.top;
    } else if (fr.left <= tr.left) {
      x1 = fr.left + fr.width; y1 = fr.top + fr.height/2;
      x2 = tr.left; y2 = tr.top + tr.height/2;
    } else {
      x1 = fr.left; y1 = fr.top + fr.height/2;
      x2 = tr.left + tr.width; y2 = tr.top + tr.height/2;
    }
    const dx = Math.max(Math.abs(x2-x1)*0.5, 24);
    const d = sameLane
      ? `M ${x1} ${y1} C ${x1} ${y1+dx*0.6}, ${x2} ${y2-dx*0.6}, ${x2} ${y2}`
      : `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
    path.setAttribute('d', d);
  });
}

buildSvg();
window.addEventListener('resize', () => requestAnimationFrame(buildSvg));
document.getElementById('canvasOuter').addEventListener('scroll', () => requestAnimationFrame(layoutEdges));

// ============================================================
// CHIPS (layer toggles)
// ============================================================
const chipsEl = document.getElementById('chips');
const activeLanes = new Set(LANE_ORDER);
LANE_ORDER.forEach(g => {
  const chip = document.createElement('div');
  chip.className = 'chip on';
  chip.innerHTML = `<i class="dot" style="background:${GROUPS[g].color}"></i>${GROUPS[g].label.split(' (')[0]}`;
  chip.addEventListener('click', () => {
    const lane = wrap.querySelector(`.lane[data-lane="${g}"]`);
    if(activeLanes.has(g)){
      activeLanes.delete(g); chip.classList.remove('on'); chip.classList.add('off');
      lane.style.display = 'none';
    } else {
      activeLanes.add(g); chip.classList.add('on'); chip.classList.remove('off');
      lane.style.display = '';
    }
    requestAnimationFrame(buildSvg);
  });
  chipsEl.appendChild(chip);
});

// ============================================================
// SELECTION / HIGHLIGHT
// ============================================================
let selectedId = null;

function connectedIds(id){
  const out = new Set([id]);
  EDGES.forEach(([f,t]) => { if(f===id) out.add(t); if(t===id) out.add(f); });
  return out;
}

function applyHighlight(id){
  const nodes = wrap.querySelectorAll('.node');
  const paths = svg.querySelectorAll('path.edge');
  const particles = svg.querySelectorAll('.particle');
  if(!id){
    nodes.forEach(n => n.classList.remove('hl','dim','selected'));
    paths.forEach(p => p.classList.remove('active','faded'));
    particles.forEach(p => p.classList.remove('faded'));
    return;
  }
  const related = connectedIds(id);
  nodes.forEach(n => {
    const nid = n.dataset.id;
    n.classList.toggle('selected', nid === id);
    n.classList.toggle('hl', related.has(nid) && nid !== id);
    n.classList.toggle('dim', !related.has(nid));
  });
  paths.forEach(p => {
    const isRel = p.dataset.from === id || p.dataset.to === id;
    p.classList.toggle('active', isRel);
    p.classList.toggle('faded', !isRel);
  });
  particles.forEach(p => {
    const isRel = p.dataset.from === id || p.dataset.to === id;
    p.classList.toggle('faded', !isRel);
  });
}

wrap.addEventListener('click', (e) => {
  const node = e.target.closest('.node');
  if(!node){
    selectedId = null; applyHighlight(null); closeDetail(); return;
  }
  const id = node.dataset.id;
  selectedId = (selectedId === id) ? null : id;
  applyHighlight(selectedId);
  if(selectedId) openDetail(byId[id], node); else closeDetail();
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){ selectedId = null; applyHighlight(null); closeDetail(); }
});

// ============================================================
// SEARCH (scan effect)
// ============================================================
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  const nodes = wrap.querySelectorAll('.node');
  if(!q){
    if(!selectedId) applyHighlight(null);
    return;
  }
  selectedId = null;
  const matched = new Set();
  nodes.forEach(n => {
    const item = byId[n.dataset.id];
    const hay = [item.title, item.desc, item.sub, item.model, item.path].filter(Boolean).join(' ').toLowerCase();
    if(hay.includes(q)) matched.add(item.id);
  });
  nodes.forEach(n => {
    n.classList.toggle('hl', matched.has(n.dataset.id));
    n.classList.toggle('dim', !matched.has(n.dataset.id));
    n.classList.remove('selected');
  });
  const paths = svg.querySelectorAll('path.edge');
  paths.forEach(p => {
    const rel = matched.has(p.dataset.from) && matched.has(p.dataset.to);
    p.classList.toggle('active', rel);
    p.classList.toggle('faded', matched.size>0 && !rel);
  });
});

// ============================================================
// DETAIL POPOVER — anchored next to the clicked node, not a side drawer
// ============================================================
let currentAnchorId = null;
const popEl = document.getElementById('detail');

function positionPopover(anchorEl){
  const rect = anchorEl.getBoundingClientRect();
  const popRect = popEl.getBoundingClientRect();
  const gap = 16, edgeGap = 8;
  const viewportW = window.innerWidth, viewportH = window.innerHeight;
  const spaceRight = viewportW - rect.right, spaceLeft = rect.left;
  const placeRight = spaceRight >= popRect.width + gap || spaceRight >= spaceLeft;

  let left = placeRight ? rect.right + gap : rect.left - gap - popRect.width;
  left = Math.max(edgeGap, Math.min(left, viewportW - popRect.width - edgeGap));

  let top = rect.top;
  top = Math.max(edgeGap, Math.min(top, viewportH - popRect.height - edgeGap));

  popEl.style.left = left + 'px';
  popEl.style.top = top + 'px';
  popEl.classList.remove('arrow-left','arrow-right');
  popEl.classList.add(placeRight ? 'arrow-left' : 'arrow-right');

  const nodeCenterY = rect.top + rect.height/2;
  const arrowY = Math.max(14, Math.min(popRect.height - 24, nodeCenterY - top - 5));
  popEl.style.setProperty('--pop-arrow-y', arrowY + 'px');
  popEl.style.setProperty('--pop-origin-x', placeRight ? '0%' : '100%');
  popEl.style.setProperty('--pop-origin-y', ((arrowY+5)/popRect.height*100) + '%');
}

function repositionIfOpen(){
  if(!currentAnchorId) return;
  const anchorEl = wrap.querySelector(`.node[data-id="${currentAnchorId}"]`);
  if(!anchorEl || anchorEl.closest('.lane').style.display === 'none'){ closeDetail(); return; }
  positionPopover(anchorEl);
}

function openDetail(item, anchorEl){
  currentAnchorId = item.id;
  document.getElementById('d-title').textContent = item.title || item.name;
  document.getElementById('d-path').textContent = item.path || '';
  let body = '';

  if(item.custom === 'config'){
    body = `<div class="config-block">${CONFIG_TEXT.replace(/</g,'&lt;')}</div>`;
  } else if(item.custom === 'storage'){
    body = `<div class="two-col-mini">
      <div class="info-box-mini"><h4>🔗 Linear Mode</h4><p>Specs viram Documents; tasks viram Issues com milestones/labels; quality reports viram Comments; drift vira sub-issues. Zero arquivos locais além de <code>ship/config.md</code>.</p></div>
      <div class="info-box-mini"><h4>💾 Local Mode</h4><p><code>ship/changes/&lt;feature&gt;/</code> guarda proposal.md, design.md, tasks.md, plan.md, report-&lt;task&gt;.md, tracking.md, drift-report.md.</p></div>
      <div class="info-box-mini"><h4>Compartilhado</h4><p><code>ship/config.md</code> (sempre local) · <code>.context/ship-run/&lt;task-id&gt;/</code> (scratch efêmero) · <code>ship/audits/&lt;tipo&gt;-&lt;data&gt;.md</code> (auditorias, sempre em disco).</p></div>
    </div>`;
  } else {
    body = `<div class="field"><label>Descrição</label><div>${item.desc||''}</div></div>`;
    if(item.model && item.model.includes('→')){
      const [from,to] = item.model.split('→');
      body += `<div class="field"><label>⚡ Rota de delegação de modelo</label><div>
        <span class="badge b-model">${from}</span> <span style="color:var(--purple)">→</span> <span class="badge b-model">${to}</span>
        </div>
        <div style="margin-top:6px; font-size:12.5px; line-height:1.55; color:var(--text)">
          O skill <code>${item.title}</code> é um <b>wrapper fino em ${from}</b> (barato, sem raciocínio pesado):
          monta o contexto (diff, config, escopo) e faz uma chamada <code>Agent</code>
          para o worker especializado <code>${item.agent||'—'}</code>, que roda em <b>${to}</b> e
          de fato executa a análise. Isso mantém o orquestrador leve e concentra o custo de token
          só onde há raciocínio real. Clique no nó <code>${item.agent}</code> na coluna "Agentes" para ver os detalhes do worker.
        </div></div>`;
    }
    if(item.agent){
      body += `<div class="field"><label>Delega para agente</label><div><code>${item.agent}</code></div></div>`;
    }
    if(item.event){
      body += `<div class="field"><label>Evento</label><div><span class="badge b-event">${item.event}</span> <span class="badge b-matcher">matcher: ${item.matcher}</span></div></div>`;
    }
    if(item.why){
      body += `<div class="field"><label>Por que existe</label><div>${item.why}</div></div>`;
    }
    const callers = EDGES.filter(([f,t,ty]) => t===item.id && (ty==='call'||ty==='hook')).map(([f]) => f);
    if(callers.length){
      body += `<div class="field"><label>Chamado por</label><div>${callers.map(c=>`<code>${byId[c] ? byId[c].title : c}</code>`).join(' ')}</div></div>`;
    }
    const targets = EDGES.filter(([f,t,ty]) => f===item.id).map(([f,t,ty]) => ({t,ty}));
    if(targets.length){
      body += `<div class="field"><label>Conecta com</label><ul>${targets.map(x=>`<li><code>${byId[x.t]?byId[x.t].title:x.t}</code> <span style="color:var(--muted)">(${x.ty})</span></li>`).join('')}</ul></div>`;
    }
  }
  document.getElementById('d-body').innerHTML = body;
  positionPopover(anchorEl);
  popEl.classList.add('open');
}

function closeDetail(){
  currentAnchorId = null;
  popEl.classList.remove('open');
}

document.getElementById('closeDetail').addEventListener('click', () => {
  selectedId = null; applyHighlight(null); closeDetail();
});

// close on outside click (anything that isn't a node or the popover itself)
document.addEventListener('click', (e) => {
  if(e.target.closest('.node') || e.target.closest('#detail')) return;
  selectedId = null; applyHighlight(null); closeDetail();
});

// keep the popover glued to its node while scrolling/resizing
window.addEventListener('resize', () => requestAnimationFrame(repositionIfOpen));
document.getElementById('canvasOuter').addEventListener('scroll', () => requestAnimationFrame(repositionIfOpen));
</script>
