name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  grep-guard:
    name: Grep Guard — no harness references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for harness binary references in plugin skills
        run: |
          if grep -rn "ship hook" plugins/ --include="*.md" 2>/dev/null; then
            echo "Error: Found harness hook references in plugin files"
            exit 1
          fi
          echo "✓ No harness references found in plugins/"

      - name: Check no Agent tool wraps Skill(ship:X) invocations
        run: ./scripts/check-no-agent-wraps-skill.sh

      - name: Check no audit:* invocations in pipeline skill files
        run: ./scripts/check-no-audit-in-pipeline.sh
