name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  grep-guard:
    name: Grep Guard — no harness references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for harness binary references in plugin skills
        run: |
          if grep -rn "ship hook" plugins/ --include="*.md" 2>/dev/null; then
            echo "Error: Found harness hook references in plugin files"
            exit 1
          fi
          echo "✓ No harness references found in plugins/"

      - name: Check no Agent tool wraps Skill(ship:X) invocations
        run: ./scripts/check-no-agent-wraps-skill.sh

      - name: Check no audit:* invocations in pipeline skill files
        run: ./scripts/check-no-audit-in-pipeline.sh

      - name: Check run orchestrator keeps patterns lazy-loaded
        run: ./scripts/check-run-lazy-load.sh

      - name: Check plan-validate wired post-planner
        run: ./scripts/check-plan-validate-wired.sh

      - name: Check status scripts wired post-run
        run: ./scripts/check-status-scripts-wired.sh

  build-drift:
    name: Build Drift — src/ ↔ plugins/ship/ em sincronia
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild plugin from src/
        run: cd plugins/ship && npm run build
      - name: Run plugin test suite
        run: cd plugins/ship && npm test
      - name: Verify no drift
        run: |
          if ! git diff --exit-code plugins/ship/skills plugins/ship/agents plugins/ship/hooks; then
            echo "::error::plugins/ship/ está desatualizado em relação a src/. Rode 'cd plugins/ship && npm run build' localmente e commite o resultado."
            exit 1
          fi
          echo "✓ plugins/ship/ está em sincronia com src/"
